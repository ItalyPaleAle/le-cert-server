baseURL = "https://le-cert-server.italypaleale.me/"
locale = "en-us"
title = "le-cert-server"
disableKinds = ["rss", "taxonomy", "term"]

[module]
  [[module.imports]]
    path = "github.com/italypaleale/hugo-assets"

# Required for render hooks + unsafe HTML in markdown
[markup]
  [markup.highlight]
    # Use CSS classes styled by main.css Chroma rules
    noClasses = false
    # Fallback only; noClasses = false overrides this
    style = "github"
    lineNos = false
    lineNumbersInTable = false
    guessSyntax = true
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Allow raw HTML in markdown content
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  description        = "Secure, centralized Let's Encrypt certificate management for multiple servers and distributed systems"
  github_url         = "https://github.com/italypaleale/le-cert-server"
  github_repo        = "https://github.com/italypaleale/le-cert-server"
  github_branch      = "main"
  PlausibleAnalytics = true

  [params.theme]
    scheme = "indigo"

# Taxonomy pages aren't needed for a docs site
[taxonomies]
